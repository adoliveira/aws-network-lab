formatter: "markdown table"

header-from: main.tf
footer-from: ""

recursive:
  enabled: false
  path: modules

sections:
  hide: []
  show: []

content: |-
  {{ .Header }}

  ## Uso

  ```hcl
  module "network" {
    source = "github.com/{{ .Repository }}"
    
    regions = {
      us_east_1 = {
        region_name         = "us-east-1"
        vpc_cidr           = "10.1.0.0/16"
        availability_zones = ["us-east-1a", "us-east-1b"]
        public_subnet_cidrs = ["10.1.1.0/24", "10.1.2.0/24"]
        private_subnet_cidrs = [
          ["10.1.11.0/24", "10.1.21.0/24"],
          ["10.1.12.0/24", "10.1.22.0/24"]
        ]
        tags = {
          Environment = "production"
        }
      }
    }
  }
  ```

  {{ .Requirements }}

  {{ .Providers }}

  {{ .Modules }}

  {{ .Resources }}

  {{ .Inputs }}

  {{ .Outputs }}

output:
  file: "TERRAFORM_DOCS.md"
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

output-values:
  enabled: false
  from: ""

sort:
  enabled: true
  by: name

settings:
  anchor: true
  color: true
  default: true
  description: false
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: true
  read-comments: true
  required: true
  sensitive: true
  type: true
