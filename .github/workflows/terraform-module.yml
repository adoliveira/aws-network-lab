name: 'Terraform Module CI/CD'

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  TF_VERSION: '1.9.0'
  TF_DOCS_VERSION: 'v0.17.0'
  CHECKOV_VERSION: '3.2.0'

jobs:
  validate:
    name: 'Validate'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Format Check
      run: terraform fmt -check -recursive

    - name: Terraform Init
      run: terraform init -backend=false

    - name: Terraform Validate
      run: terraform validate

    - name: Setup Python for Checkov
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Checkov
      run: pip install checkov==${{ env.CHECKOV_VERSION }}

    - name: Run Checkov
      run: |
        checkov --framework terraform \
                --check CKV_AWS_79,CKV_AWS_130,CKV_AWS_135,CKV_AWS_83,CKV_AWS_24 \
                --directory . \
                --output cli \
                --output sarif \
                --output-file-path console,checkov-report.sarif \
                --soft-fail \
                --soft-fail

    - name: Upload Checkov SARIF file
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: checkov-report.sarif

  test:
    name: 'Test'
    runs-on: ubuntu-latest
    needs: validate
    
    strategy:
      matrix:
        terraform_version: ['1.5.0', '1.6.0', '1.7.0', '1.8.0', '1.9.0']
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ matrix.terraform_version }}

    - name: Terraform Init
      run: terraform init -backend=false

    - name: Terraform Plan (Dry Run)
      run: |
        cat > test.tfvars << EOF
        regions = {
          us_east_1 = {
            region_name         = "us-east-1"
            vpc_cidr           = "10.1.0.0/16"
            availability_zones = ["us-east-1a", "us-east-1b"]
            public_subnet_cidrs = ["10.1.1.0/24", "10.1.2.0/24"]
            private_subnet_cidrs = [
              ["10.1.11.0/24", "10.1.21.0/24"],
              ["10.1.12.0/24", "10.1.22.0/24"]
            ]
            tags = { Purpose = "test" }
          }
        }
        EOF
        terraform plan -var-file=test.tfvars

  test-examples:
    name: 'Test Examples'
    runs-on: ubuntu-latest
    needs: validate
    
    strategy:
      matrix:
        example: ['single-region', 'multi-region']
        terraform_version: ['1.8.0', '1.9.0']
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ matrix.terraform_version }}

    - name: Test Example - ${{ matrix.example }}
      run: |
        cd examples/${{ matrix.example }}
        echo "🧪 Testing example: ${{ matrix.example }} with Terraform ${{ matrix.terraform_version }}"
        
        # Initialize and validate
        terraform init -backend=false
        terraform validate
        
        # Format check
        terraform fmt -check
        
        # Plan (dry run)
        terraform plan
        
        echo "✅ Example ${{ matrix.example }} passed all tests"

  registry-readiness:
    name: 'Registry Readiness Check'
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Make scripts executable
      run: |
        chmod +x check-registry-ready.sh
        chmod +x validate.sh

    - name: Run Registry Readiness Check
      run: |
        echo "🔍 Checking if module is ready for Terraform Registry..."
        ./check-registry-ready.sh

    - name: Run Validation Script
      run: |
        echo "✅ Running comprehensive validation..."
        ./validate.sh

  documentation:
    name: 'Generate Documentation'
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup terraform-docs
      uses: terraform-docs/gh-actions@v1
      with:
        working-dir: .
        output-file: TERRAFORM_DOCS.md
        output-method: inject
        git-push: "true"
        git-commit-message: "docs: update terraform documentation"

  tag-version:
    name: 'Tag Version'
    runs-on: ubuntu-latest
    needs: [validate, test, test-examples, registry-readiness]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure Git
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com

    - name: Install semantic-release
      run: |
        npm install -g semantic-release
        npm install -g @semantic-release/changelog
        npm install -g @semantic-release/git
        npm install -g @semantic-release/github

    - name: Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx semantic-release

  publish-registry:
    name: 'Publish to Terraform Registry'
    runs-on: ubuntu-latest
    needs: [validate, test, test-examples, registry-readiness]
    if: github.event_name == 'release' && github.event.action == 'published'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Validate Module Structure
      run: |
        echo "Validating Terraform Registry requirements..."
        
        # Check required files
        required_files=("main.tf" "variables.tf" "outputs.tf" "versions.tf" "README.md")
        for file in "${required_files[@]}"; do
          if [[ ! -f "$file" ]]; then
            echo "ERROR: Required file $file not found"
            exit 1
          fi
        done
        
        # Check version tag format
        if [[ ! "${{ github.event.release.tag_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "ERROR: Release tag must follow semantic versioning (v1.0.0)"
          exit 1
        fi
        
        echo "✅ Module structure is valid for Terraform Registry"

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Final Validation
      run: |
        terraform init -backend=false
        terraform validate
        terraform fmt -check -recursive

    - name: Final Registry Check
      run: |
        chmod +x check-registry-ready.sh
        echo "🔍 Final registry readiness check before publication..."
        ./check-registry-ready.sh

    - name: Test Examples Before Publication
      run: |
        echo "🧪 Testing all examples before publication..."
        
        # Test single-region example
        cd examples/single-region
        terraform init -backend=false
        terraform validate
        terraform plan
        cd ../..
        
        # Test multi-region example
        cd examples/multi-region
        terraform init -backend=false
        terraform validate
        terraform plan
        cd ../..
        
        echo "✅ All examples validated successfully"

    - name: Create Release Assets
      run: |
        # Create module archive
        tar -czf terraform-aws-network-${{ github.event.release.tag_name }}.tar.gz \
          --exclude='.git*' \
          --exclude='node_modules' \
          --exclude='test.tfvars' \
          --exclude='.terraform*' \
          .

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./terraform-aws-network-${{ github.event.release.tag_name }}.tar.gz
        asset_name: terraform-aws-network-${{ github.event.release.tag_name }}.tar.gz
        asset_content_type: application/gzip

    - name: Notify Registry
      run: |
        echo "🎉 Module published! The Terraform Registry will automatically detect this release."
        echo "📦 Tag: ${{ github.event.release.tag_name }}"
        echo "🌐 Para conectar ao Terraform Registry:"
        echo "   1. Acesse: https://registry.terraform.io/"
        echo "   2. Faça login com sua conta GitHub"
        echo "   3. Clique em 'Publish Module'"
        echo "   4. Selecione este repositório: ${{ github.repository }}"
        echo "   5. O módulo será publicado automaticamente"
        echo ""
        echo "🔗 Após publicação, estará disponível em:"
        echo "   https://registry.terraform.io/modules/${{ github.repository_owner }}/aws-network-lab/aws"

  summary:
    name: 'Pipeline Summary'
    runs-on: ubuntu-latest
    needs: [validate, test, test-examples, registry-readiness, documentation]
    if: always()
    
    steps:
    - name: Pipeline Results Summary
      run: |
        echo "📊 RESUMO DA PIPELINE CI/CD"
        echo "=================================="
        echo ""
        echo "🔍 Validação: ${{ needs.validate.result }}"
        echo "🧪 Testes: ${{ needs.test.result }}"
        echo "📋 Exemplos: ${{ needs.test-examples.result }}"
        echo "✅ Registry Check: ${{ needs.registry-readiness.result }}"
        echo "📚 Documentação: ${{ needs.documentation.result }}"
        echo ""
        
        if [[ "${{ needs.validate.result }}" == "success" && "${{ needs.test.result }}" == "success" && "${{ needs.test-examples.result }}" == "success" && "${{ needs.registry-readiness.result }}" == "success" ]]; then
          echo "🎉 SUCESSO! Módulo está pronto para uso e publicação"
          echo ""
          echo "📦 Para criar release:"
          echo "   ./release.sh v1.0.0"
          echo ""
          echo "🌐 Para publicar no registry:"
          echo "   1. Acesse registry.terraform.io"
          echo "   2. Conecte com GitHub"
          echo "   3. Publique o módulo"
        else
          echo "❌ FALHAS DETECTADAS - Verifique os logs dos jobs"
          exit 1
        fi
